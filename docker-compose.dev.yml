version: '3.8'

# Development overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "5432:5432"  # Expose database port for local tools
    environment:
      POSTGRES_PASSWORD: devpassword

  api:
    build:
      context: ./src-tauri
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development
    volumes:
      - ./src-tauri/src:/app/src:ro  # Mount source for hot reload
      - user-data:/app/user-data
      - ./src-generator:/app/src-generator:ro
    environment:
      - RUST_LOG=debug
      - RUST_BACKTRACE=1
      - DATABASE_URL=postgresql://pwbuser:devpassword@postgres:5432/professional_website_builder
    command: ["cargo", "watch", "-x", "run"]  # Hot reload with cargo-watch

  frontend:
    build:
      context: ./src-ui
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development
    volumes:
      - ./src-ui/src:/app/src:ro  # Mount source for hot reload
      - ./src-ui/public:/app/public:ro
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3001
    ports:
      - "5173:5173"  # Vite dev server port

  generator:
    volumes:
      - ./src-generator:/app:ro  # Mount entire source directory
      - user-data:/app/user-data
      - /app/node_modules  # Preserve node_modules in container
      - /app/.next  # Preserve Next.js build cache
    command: ["npm", "run", "dev"]
    environment:
      - NODE_ENV=development

  # Add development tools
  adminer:
    image: adminer:latest
    container_name: pwb-adminer
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula

volumes:
  user-data:
    name: pwb-user-data-dev

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pwb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-professional_website_builder}
      POSTGRES_USER: ${POSTGRES_USER:-pwbuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - app-network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pwbuser} -d ${POSTGRES_DB:-professional_website_builder}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Rust Backend API
  api:
    build:
      context: ./src-tauri
      dockerfile: Dockerfile
    container_name: pwb-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pwbuser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-professional_website_builder}
      - API_PORT=3001
      - RUST_LOG=${RUST_LOG:-info}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - NODE_ENV=production
    volumes:
      - user-data:/app/user-data
      - ./src-generator:/app/src-generator:ro
    networks:
      - app-network
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # React Frontend with Nginx
  frontend:
    build:
      context: ./src-ui
      dockerfile: Dockerfile
    container_name: pwb-frontend
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Next.js Generator (optional - can be run on-demand)
  generator:
    build:
      context: ./src-generator
      dockerfile: Dockerfile
    container_name: pwb-generator
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3002
    volumes:
      - user-data:/app/user-data
    networks:
      - app-network
    ports:
      - "${GENERATOR_PORT:-3002}:3002"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
    name: pwb-network

volumes:
  postgres-data:
    name: pwb-postgres-data
  user-data:
    name: pwb-user-data

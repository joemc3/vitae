services:
  postgres-dev:
    image: postgres:16-alpine
    profiles: ["dev"]
    environment:
      POSTGRES_DB: vitae
      POSTGRES_USER: vitae
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vitaepass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitae -d vitae"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - app-network

  redis-dev:
    image: redis:7-alpine
    profiles: ["dev"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - app-network

  api-dev:
    build:
      context: .
      dockerfile: src-api/Dockerfile
    profiles: ["dev"]
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vitae:${POSTGRES_PASSWORD:-vitaepass}@postgres-dev:5432/vitae
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      REDIS_URL: redis://redis-dev:6379
      UPLOAD_DIR: /data/uploads
      SITE_URL: ${SITE_URL:-http://localhost:8080}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:5173}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      LOG_LEVEL: debug
      GENERATION_DIR: /data/generation
      OUTPUT_DIR: /data/output
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
    volumes:
      - ./src-api/app:/app/app
      - ./src-api/migrations:/app/migrations
      - uploads-data:/data/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks:
      - app-network

  worker-dev:
    build:
      context: .
      dockerfile: src-api/Dockerfile
    profiles: ["dev"]
    command: ["uv", "run", "arq", "app.worker.WorkerSettings"]
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vitae:${POSTGRES_PASSWORD:-vitaepass}@postgres-dev:5432/vitae
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      REDIS_URL: redis://redis-dev:6379
      UPLOAD_DIR: /data/uploads
      LOG_LEVEL: debug
      GENERATION_DIR: /data/generation
      OUTPUT_DIR: /data/output
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
    volumes:
      - ./src-api/app:/app/app
      - uploads-data:/data/uploads
      - generation-data:/data/generation
      - output-data:/data/output
    networks:
      - app-network

  frontend-dev:
    build:
      context: ./src-ui
      dockerfile: Dockerfile
      target: dev
    profiles: ["dev"]
    environment:
      VITE_API_PROXY_TARGET: http://api-dev:8000
    ports:
      - "5173:5173"
    volumes:
      - ./src-ui/src:/app/src
      - ./src-ui/public:/app/public
      - ./src-ui/vite.config.ts:/app/vite.config.ts:ro
    depends_on:
      api-dev:
        condition: service_healthy
    networks:
      - app-network

  public-sites-dev:
    image: nginx:alpine
    profiles: ["dev"]
    volumes:
      - output-data:/data/output:ro
      - ./nginx/sites.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - app-network

volumes:
  postgres-data:
  uploads-data:
  generation-data:
  output-data:

networks:
  app-network:
    driver: bridge
